<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — AI FAQ Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0E1116;
    --panel:#161B22;
    --panel-raised:#1C222B;
    --border:#2A313C;
    --text:#E8EAED;
    --text-dim:#8B92A3;
    --accent:#5EE6B0;
    --accent-dim:#2E5E4D;
    --user-bubble:#2A3F52;
    --bot-bubble:#1C222B;
    --warn:#E6B45E;
    --radius:16px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:40px 20px 80px;
  }
  .app{
    width:100%;
    max-width:920px;
  }
  .header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:28px;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  .brand-mark{
    width:38px;height:38px;
    border-radius:10px;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    color:#0E1116;
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:18px;
  }
  .brand h1{
    font-family:'Space Grotesk',sans-serif;
    font-weight:500;
    font-size:22px;
  }
  .brand p{
    font-size:12px;
    color:var(--text-dim);
    margin-top:1px;
  }
  .status-dot{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:var(--text-dim);
  }
  .status-dot span.dot{
    width:7px;height:7px;border-radius:50%;
    background:var(--accent);
    box-shadow:0 0 0 3px rgba(94,230,176,0.15);
  }

  .layout{
    display:grid;
    grid-template-columns:1fr 280px;
    gap:20px;
  }

  .chat-shell{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    display:flex;
    flex-direction:column;
    height:600px;
    overflow:hidden;
  }

  .messages{
    flex:1;
    overflow-y:auto;
    padding:24px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .messages::-webkit-scrollbar{width:6px;}
  .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

  .msg-row{display:flex;gap:10px;max-width:88%;}
  .msg-row.user{align-self:flex-end;flex-direction:row-reverse;}
  .msg-row.bot{align-self:flex-start;}

  .avatar{
    width:30px;height:30px;border-radius:8px;
    display:flex;align-items:center;justify-content:center;
    font-size:13px;font-weight:600;flex-shrink:0;
  }
  .avatar.bot{background:var(--accent-dim);color:var(--accent);}
  .avatar.user{background:#3A4658;color:#C3D0E0;}

  .bubble{
    padding:12px 16px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.55;
  }
  .msg-row.bot .bubble{
    background:var(--bot-bubble);
    border:1px solid var(--border);
    border-top-left-radius:4px;
  }
  .msg-row.user .bubble{
    background:var(--user-bubble);
    border-top-right-radius:4px;
  }

  .meta-tag{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:10.5px;
    color:var(--text-dim);
    margin-top:8px;
    padding-top:8px;
    border-top:1px solid var(--border);
  }
  .meta-tag .pct{color:var(--accent);font-weight:600;}

  .suggestions{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-top:10px;
  }
  .suggestion-chip{
    font-size:12px;
    padding:6px 12px;
    border-radius:20px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text-dim);
    cursor:pointer;
    transition:all 0.15s;
  }
  .suggestion-chip:hover{
    border-color:var(--accent);
    color:var(--accent);
  }

  .typing-indicator{
    display:flex;
    gap:4px;
    padding:6px 0;
  }
  .typing-indicator span{
    width:6px;height:6px;border-radius:50%;
    background:var(--text-dim);
    animation:bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2){animation-delay:0.15s;}
  .typing-indicator span:nth-child(3){animation-delay:0.3s;}
  @keyframes bounce{
    0%,60%,100%{transform:translateY(0);opacity:0.4;}
    30%{transform:translateY(-4px);opacity:1;}
  }

  .composer{
    border-top:1px solid var(--border);
    padding:14px 16px;
    display:flex;
    gap:10px;
    align-items:flex-end;
  }
  .composer textarea{
    flex:1;
    background:var(--panel-raised);
    border:1px solid var(--border);
    border-radius:12px;
    color:var(--text);
    font-family:'Inter',sans-serif;
    font-size:14px;
    padding:11px 14px;
    resize:none;
    max-height:100px;
    outline:none;
  }
  .composer textarea:focus{border-color:var(--accent);}
  .composer textarea::placeholder{color:var(--text-dim);}

  .send-btn{
    width:42px;height:42px;
    border-radius:12px;
    background:var(--accent);
    border:none;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    color:#0E1116;
    flex-shrink:0;
    transition:opacity 0.15s;
  }
  .send-btn:disabled{opacity:0.35;cursor:default;}
  .send-btn svg{width:18px;height:18px;}

  .sidebar{
    display:flex;
    flex-direction:column;
    gap:14px;
  }
  .panel-card{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:var(--radius);
    padding:16px;
  }
  .panel-card h3{
    font-size:12px;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--text-dim);
    margin-bottom:12px;
    font-weight:600;
  }
  .topic-list{
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .topic-item{
    font-size:13px;
    padding:8px 10px;
    border-radius:8px;
    background:var(--panel-raised);
    cursor:pointer;
    border:1px solid transparent;
    transition:border-color 0.15s;
  }
  .topic-item:hover{border-color:var(--accent-dim);}

  .stat-row{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    color:var(--text-dim);
    padding:7px 0;
    border-bottom:1px solid var(--border);
  }
  .stat-row:last-child{border-bottom:none;}
  .stat-row b{color:var(--text);font-weight:600;}

  @media (max-width:760px){
    .layout{grid-template-columns:1fr;}
    .chat-shell{height:500px;}
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="brand">
      <div class="brand-mark">A</div>
      <div>
        <h1>Atlas</h1>
        <p>AI FAQ assistant — intent + similarity matching</p>
      </div>
    </div>
    <div class="status-dot"><span class="dot"></span> online</div>
  </div>

  <div class="layout">
    <div class="chat-shell">
      <div class="messages" id="messages"></div>
      <div class="composer">
        <textarea id="input" rows="1" placeholder="Ask about shipping, returns, accounts, pricing…"></textarea>
        <button class="send-btn" id="send-btn" aria-label="Send">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>
        </button>
      </div>
    </div>

    <div class="sidebar">
      <div class="panel-card">
        <h3>Popular topics</h3>
        <div class="topic-list" id="topic-list"></div>
      </div>
      <div class="panel-card">
        <h3>How matching works</h3>
        <div class="stat-row"><span>Vectorizer</span><b>TF-IDF</b></div>
        <div class="stat-row"><span>Similarity</span><b>Cosine</b></div>
        <div class="stat-row"><span>Knowledge base</span><b id="kb-size">—</b></div>
        <div class="stat-row"><span>Confidence floor</span><b>32%</b></div>
      </div>
    </div>
  </div>

</div>

<script>
const FAQ_DB = [
  { id:'ship_time', tags:['shipping','delivery'],
    q:["How long does shipping take?","When will my order arrive?","What's the delivery time?","how long for delivery"],
    a:"Standard shipping takes 3-5 business days within the country, and 7-14 business days internationally. Express shipping (where available) takes 1-2 business days." },
  { id:'ship_cost', tags:['shipping','pricing'],
    q:["How much does shipping cost?","Is shipping free?","What are the shipping charges?","do you offer free shipping"],
    a:"Shipping is free on orders over $50. Below that, standard shipping costs a flat $4.99, and express shipping costs $14.99." },
  { id:'ship_track', tags:['shipping'],
    q:["How do I track my order?","Where is my package?","track my shipment","can I see where my order is"],
    a:"Once your order ships, you'll receive a tracking link by email. You can also track any order from the 'Order History' page in your account." },
  { id:'returns_policy', tags:['returns','refunds'],
    q:["What is your return policy?","Can I return an item?","how do returns work","return policy"],
    a:"You can return most items within 30 days of delivery for a full refund, as long as they're unused and in original packaging. Sale items are final sale unless defective." },
  { id:'refund_time', tags:['returns','refunds'],
    q:["How long do refunds take?","When will I get my refund?","refund processing time"],
    a:"Refunds are processed within 5-7 business days of us receiving your returned item, and typically appear on your statement a few days after that, depending on your bank." },
  { id:'exchange', tags:['returns'],
    q:["Can I exchange an item for a different size?","how do I exchange a product","swap for different size"],
    a:"Yes, exchanges are free for size or color within 30 days. Start an exchange from your order history, and we'll ship the replacement as soon as the original is scanned at the carrier." },
  { id:'account_create', tags:['account'],
    q:["How do I create an account?","sign up for an account","how to register"],
    a:"Click 'Sign up' in the top right corner, enter your email and a password, and verify your email address. You can also sign up using Google or Apple." },
  { id:'account_password', tags:['account','security'],
    q:["I forgot my password","how do I reset my password","can't log in to my account"],
    a:"Go to the login page and click 'Forgot password.' We'll email you a secure reset link that's valid for 30 minutes." },
  { id:'account_delete', tags:['account'],
    q:["How do I delete my account?","close my account","remove my profile permanently"],
    a:"You can delete your account from Settings → Privacy → Delete account. This is permanent and removes your order history, saved addresses, and preferences after a 14-day grace period." },
  { id:'payment_methods', tags:['payment','pricing'],
    q:["What payment methods do you accept?","can I pay with PayPal","do you take Apple Pay"],
    a:"We accept all major credit and debit cards, PayPal, Apple Pay, and Google Pay. In select countries we also support installment payments through Klarna." },
  { id:'payment_failed', tags:['payment'],
    q:["My payment was declined","why did my card get rejected","payment isn't going through"],
    a:"Declines are usually caused by a billing address mismatch, insufficient funds, or your bank flagging an unfamiliar charge. Double-check your billing details, or try a different payment method." },
  { id:'discount_code', tags:['pricing','promotions'],
    q:["How do I use a discount code?","apply a coupon","promo code not working"],
    a:"Enter your code in the 'Promo code' field at checkout, just above the order total, then click Apply. Codes are case-sensitive and can't be combined with other offers unless stated." },
  { id:'price_match', tags:['pricing'],
    q:["Do you price match?","will you match a lower price elsewhere","price guarantee"],
    a:"We offer price matching within 14 days of purchase if you find the identical item in stock at a lower price from a major authorized retailer. Contact support with a link to file a claim." },
  { id:'product_sizing', tags:['product'],
    q:["How do I know what size to order?","sizing chart","what size should I get"],
    a:"Each product page has a 'Size guide' link with detailed measurements. If you're between sizes, our general recommendation is to size up for a relaxed fit." },
  { id:'product_warranty', tags:['product'],
    q:["Is there a warranty?","what's covered under warranty","product guarantee"],
    a:"Most products come with a 1-year manufacturer warranty covering defects in materials and workmanship. It doesn't cover normal wear and tear or accidental damage." },
  { id:'contact_support', tags:['support'],
    q:["How do I contact a human?","talk to a real person","speak to customer service","is there live support"],
    a:"You can reach our support team via live chat (9am-9pm local time), email at support@example.com, or by requesting a callback from your account dashboard." },
  { id:'order_cancel', tags:['orders'],
    q:["Can I cancel my order?","how to cancel an order","I want to cancel my purchase"],
    a:"Orders can be cancelled for free within 1 hour of placing them, before they enter fulfillment. After that, you'll need to wait for delivery and start a return instead." },
  { id:'order_change_address', tags:['orders','shipping'],
    q:["Can I change my shipping address after ordering?","wrong address on my order","update delivery address"],
    a:"If your order hasn't shipped yet, contact support immediately and we'll try to update it. Once it's shipped, we can't redirect it, but you can usually reroute it with the carrier directly." },
  { id:'gift_cards', tags:['payment','pricing'],
    q:["Do you sell gift cards?","how do gift cards work","buy a gift card"],
    a:"Yes — digital gift cards are available from $10 to $500 and are delivered by email instantly. They never expire and can be combined with promo codes." },
  { id:'student_discount', tags:['pricing','promotions'],
    q:["Do you offer a student discount?","is there a discount for students"],
    a:"Yes, verified students get 15% off with a valid student email or ID verification through our partner, SheerID. Look for the 'Student discount' link in the footer." }
];

const STOPWORDS = new Set(['a','an','the','is','it','of','to','in','on','for','and','or','do','does','did','i','you','my','your','how','what','can','will','am','are','this','that','with','about']);

function tokenize(text){
  return text.toLowerCase()
    .replace(/[^a-z0-9\s']/g, ' ')
    .split(/\s+/)
    .filter(t => t.length > 1 && !STOPWORDS.has(t));
}

const corpus = [];
const corpusMeta = [];
FAQ_DB.forEach(entry => {
  entry.q.forEach(question => {
    corpus.push(tokenize(question));
    corpusMeta.push(entry);
  });
});

const vocab = new Map();
corpus.forEach(doc => doc.forEach(term => {
  vocab.set(term, (vocab.get(term) || 0) + 1);
}));

const idf = new Map();
const N = corpus.length;
vocab.forEach((_, term) => {
  const df = corpus.filter(doc => doc.includes(term)).length;
  idf.set(term, Math.log(N / (1 + df)) + 1);
});

function tfVector(tokens){
  const tf = new Map();
  tokens.forEach(t => tf.set(t, (tf.get(t) || 0) + 1));
  const vec = new Map();
  tf.forEach((count, term) => {
    if(idf.has(term)){
      vec.set(term, (count / tokens.length) * idf.get(term));
    }
  });
  return vec;
}

const docVectors = corpus.map(tfVector);

function cosineSim(vecA, vecB){
  let dot = 0, magA = 0, magB = 0;
  vecA.forEach((val, key) => {
    magA += val * val;
    if(vecB.has(key)) dot += val * vecB.get(key);
  });
  vecB.forEach(val => { magB += val * val; });
  if(magA === 0 || magB === 0) return 0;
  return dot / (Math.sqrt(magA) * Math.sqrt(magB));
}

function findBestMatch(query){
  const tokens = tokenize(query);
  if(tokens.length === 0) return null;
  const qVec = tfVector(tokens);

  let best = { score: 0, entry: null };
  docVectors.forEach((docVec, i) => {
    const score = cosineSim(qVec, docVec);
    if(score > best.score){
      best = { score, entry: corpusMeta[i] };
    }
  });
  return best;
}

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send-btn');
const topicListEl = document.getElementById('topic-list');
document.getElementById('kb-size').textContent = FAQ_DB.length + ' intents';

const TOPIC_SAMPLES = [
  "How long does shipping take?",
  "What is your return policy?",
  "I forgot my password",
  "Do you offer a student discount?",
  "Can I cancel my order?",
  "Is there a warranty?"
];
TOPIC_SAMPLES.forEach(t => {
  const div = document.createElement('div');
  div.className = 'topic-item';
  div.textContent = t;
  div.addEventListener('click', () => { inputEl.value = t; sendMessage(); });
  topicListEl.appendChild(div);
});

function scrollToBottom(){
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addMessage(role, html){
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  row.innerHTML = `
    <div class="avatar ${role}">${role === 'bot' ? 'A' : 'U'}</div>
    <div class="bubble">${html}</div>
  `;
  messagesEl.appendChild(row);
  scrollToBottom();
  return row;
}

function showTyping(){
  const row = document.createElement('div');
  row.className = 'msg-row bot';
  row.id = 'typing-row';
  row.innerHTML = `
    <div class="avatar bot">A</div>
    <div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>
  `;
  messagesEl.appendChild(row);
  scrollToBottom();
}

function removeTyping(){
  const row = document.getElementById('typing-row');
  if(row) row.remove();
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function botRespond(query){
  showTyping();
  const delay = 500 + Math.random() * 400;
  setTimeout(() => {
    removeTyping();
    const match = findBestMatch(query);
    const CONFIDENCE_FLOOR = 0.32;

    if(!match || match.score < CONFIDENCE_FLOOR){
      const related = suggestRelated(query);
      let html = `I'm not confident I have an exact answer for that. Could you rephrase, or pick one of these related topics?`;
      addMessage('bot', html);
      if(related.length){
        const row = messagesEl.lastChild.querySelector('.bubble');
        const sugDiv = document.createElement('div');
        sugDiv.className = 'suggestions';
        related.forEach(r => {
          const chip = document.createElement('button');
          chip.className = 'suggestion-chip';
          chip.textContent = r.q[0];
          chip.addEventListener('click', () => { inputEl.value = r.q[0]; sendMessage(); });
          sugDiv.appendChild(chip);
        });
        row.appendChild(sugDiv);
      }
      return;
    }

    const pct = Math.round(match.score * 100);
    const html = `${escapeHtml(match.entry.a)}<div class="meta-tag">Matched intent <b>${match.entry.id}</b> · confidence <span class="pct">${pct}%</span></div>`;
    addMessage('bot', html);
  }, delay);
}

function suggestRelated(query){
  const tokens = new Set(tokenize(query));
  const scored = FAQ_DB.map(entry => {
    const overlap = entry.tags.filter(t => Array.from(tokens).some(tok => t.includes(tok) || tok.includes(t))).length;
    return { entry, overlap };
  }).filter(s => s.overlap > 0);
  if(scored.length === 0){
    return FAQ_DB.slice(0, 3);
  }
  return scored.sort((a,b) => b.overlap - a.overlap).slice(0,3).map(s => s.entry);
}

function sendMessage(){
  const text = inputEl.value.trim();
  if(!text) return;
  addMessage('user', escapeHtml(text));
  inputEl.value = '';
  inputEl.style.height = 'auto';
  botRespond(text);
}

sendBtn.addEventListener('click', sendMessage);
inputEl.addEventListener('keydown', e => {
  if(e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMessage();
  }
});
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
});

addMessage('bot', "Hi, I'm Atlas. Ask me anything about shipping, returns, payments, your account, or our products — I'll match your question against our FAQ knowledge base using TF-IDF similarity.");
</script>
</body>
</html>
